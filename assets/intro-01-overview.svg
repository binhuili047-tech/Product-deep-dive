<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#7a4b2c" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f7f1e7; }
      .rust { fill: #b6542d; }
      .ink { fill: #202124; }
      .muted { fill: #5f5a52; }
      .fine { fill: #766f65; }
      .card { fill: #fbf7ee; stroke: #dfd4c4; stroke-width: 1.4; }
      .mini { fill: #fffaf1; stroke: #e2d4c2; stroke-width: 1.2; }
      .line { stroke: #c25d31; stroke-width: 3; fill: none; stroke-linecap: round; }
      .thin { stroke: #c7b7a4; stroke-width: 1.5; fill: none; }
      .num { fill: #b6542d; font-size: 21px; font-weight: 800; font-family: Arial, "Microsoft YaHei", sans-serif; }
      .sans { font-family: Arial, "Microsoft YaHei", "PingFang SC", sans-serif; }
      .serif { font-family: Georgia, "Times New Roman", "SimSun", serif; }
      .titleRust { font-size: 78px; font-weight: 800; letter-spacing: 0; }
      .titleInk { font-size: 94px; font-weight: 900; letter-spacing: 0; }
      .sub { font-size: 28px; font-weight: 700; }
      .body { font-size: 20px; }
      .small { font-size: 15px; }
      .tiny { font-size: 13px; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect width="1600" height="900" filter="url(#paperNoise)" opacity="0.55"/>

  <g transform="translate(58 76)">
    <text class="serif rust titleRust" x="0" y="0" dominant-baseline="hanging">AI 产品拆解后，</text>
    <text class="serif ink titleInk" x="0" y="104" dominant-baseline="hanging">直接生成飞书文档</text>
    <path class="line" d="M648 12 q25 -25 52 -7"/>
    <path class="line" d="M687 54 l34 14"/>
    <text class="serif rust sub" x="0" y="266">product-deep-dive</text>
    <text class="sans ink sub" x="280" y="266">：产品名 / 官网 / 截图 → 资深 AIPM 长文</text>
  </g>

  <g transform="translate(62 430)">
    <g filter="url(#softShadow)">
      <rect class="card" x="0" y="0" width="184" height="270" rx="10"/>
      <circle cx="35" cy="31" r="14" fill="#c25d31"/>
      <text class="sans" x="35" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">1</text>
      <text class="sans ink body" x="58" y="38" font-weight="800">输入对象</text>
      <rect class="mini" x="18" y="72" width="148" height="42" rx="7"/>
      <text class="sans muted" x="51" y="99" font-size="17">产品名</text>
      <text class="sans fine" x="28" y="100" font-size="23" font-weight="700">A</text>
      <rect class="mini" x="18" y="128" width="148" height="42" rx="7"/>
      <text class="sans muted" x="52" y="155" font-size="17">官网 URL</text>
      <path class="thin" d="M31 152 q13 -19 26 0 q-13 19 -26 0"/>
      <rect class="mini" x="18" y="184" width="148" height="42" rx="7"/>
      <text class="sans muted" x="52" y="211" font-size="17">截图/资料</text>
      <path class="thin" d="M31 192 h18 v25 h-18z M36 198 h8 M36 204 h8"/>
    </g>
    <text class="sans ink small" x="92" y="310" text-anchor="middle">支持产品名、链接、截图</text>

    <path class="line" d="M204 134 h42"/>
    <path class="line" d="M236 124 l12 10 -12 10"/>

    <g transform="translate(260 0)" filter="url(#softShadow)">
      <rect class="card" width="184" height="270" rx="10"/>
      <circle cx="35" cy="31" r="14" fill="#c25d31"/>
      <text class="sans" x="35" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">2</text>
      <text class="sans ink body" x="58" y="38" font-weight="800">检索事实</text>
      <rect class="mini" x="39" y="73" width="106" height="150" rx="8"/>
      <path class="thin" d="M58 101 h68 M58 127 h50 M58 153 h70 M58 179 h42"/>
      <circle cx="52" cy="126" r="3" fill="#c25d31"/>
      <circle cx="52" cy="152" r="3" fill="#c25d31"/>
      <circle cx="52" cy="178" r="3" fill="#c25d31"/>
      <circle cx="136" cy="212" r="21" fill="#c25d31"/>
      <path d="M125 212 l9 10 18 -23" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/>
    </g>
    <text class="sans ink small" x="352" y="310" text-anchor="middle">官网、公开资料、体验证据</text>

    <path class="line" d="M464 134 h42"/>
    <path class="line" d="M496 124 l12 10 -12 10"/>

    <g transform="translate(520 0)" filter="url(#softShadow)">
      <rect class="card" width="184" height="270" rx="10"/>
      <circle cx="35" cy="31" r="14" fill="#c25d31"/>
      <text class="sans" x="35" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">3</text>
      <text class="sans ink body" x="58" y="38" font-weight="800">深挖问题</text>
      <rect class="mini" x="24" y="72" width="62" height="50" rx="7" stroke="#c25d31"/>
      <rect class="mini" x="98" y="72" width="62" height="50" rx="7"/>
      <rect class="mini" x="24" y="136" width="62" height="50" rx="7"/>
      <rect class="mini" x="98" y="136" width="62" height="50" rx="7"/>
      <rect class="mini" x="24" y="200" width="62" height="50" rx="7"/>
      <rect class="mini" x="98" y="200" width="62" height="50" rx="7"/>
      <path class="thin" d="M38 102 h32 M112 102 h34 M38 166 h32 M112 166 h34 M38 230 h32"/>
      <circle cx="151" cy="69" r="10" fill="#c25d31"/>
      <path d="M146 69 l4 5 8 -10" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <text class="sans ink small" x="612" y="310" text-anchor="middle">每章 3-8 个高价值问题</text>

    <path class="line" d="M724 134 h42"/>
    <path class="line" d="M756 124 l12 10 -12 10"/>

    <g transform="translate(780 0)" filter="url(#softShadow)">
      <rect class="card" width="184" height="270" rx="10"/>
      <circle cx="35" cy="31" r="14" fill="#c25d31"/>
      <text class="sans" x="35" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">4</text>
      <text class="sans ink body" x="58" y="38" font-weight="800">生成长文</text>
      <rect class="mini" x="40" y="72" width="104" height="156" rx="8"/>
      <text class="sans rust" x="59" y="116" font-size="32" font-weight="800">13</text>
      <path d="M83 106 h37 M60 143 h66 M60 164 h48 M60 185 h62" stroke="#665e55" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M60 206 h32" stroke="#c25d31" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    <text class="sans ink small" x="872" y="310" text-anchor="middle">核心结论 + 13 章结构</text>

    <path class="line" d="M984 134 h42"/>
    <path class="line" d="M1016 124 l12 10 -12 10"/>

    <g transform="translate(1040 0)" filter="url(#softShadow)">
      <rect class="card" width="184" height="270" rx="10"/>
      <circle cx="35" cy="31" r="14" fill="#c25d31"/>
      <text class="sans" x="35" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="800">5</text>
      <text class="sans ink body" x="58" y="38" font-weight="800">写入飞书</text>
      <path d="M65 70 h56 l34 34 v130 h-90z" fill="#fff8ef" stroke="#d5c6b3" stroke-width="2"/>
      <path d="M121 70 v34 h34" fill="none" stroke="#d5c6b3" stroke-width="2"/>
      <rect x="77" y="166" width="68" height="38" rx="5" fill="#c25d31"/>
      <text class="sans" x="111" y="191" fill="#fff" text-anchor="middle" font-weight="800" font-size="18">DOC</text>
    </g>
    <text class="sans ink small" x="1132" y="310" text-anchor="middle">新建或更新飞书文档</text>
  </g>

  <g transform="translate(1045 54)">
    <text class="sans ink body" x="140" y="0" font-weight="800" text-anchor="middle">最终文档包含</text>
    <g transform="translate(0 30)" filter="url(#softShadow)">
      <rect class="card" width="240" height="150" rx="10"/>
      <text class="serif ink" x="24" y="45" font-size="25" font-weight="800">核心结论</text>
      <text class="sans muted" x="24" y="78" font-size="15">3 个学习点 / 3 个风险</text>
      <path class="line" d="M24 103 h42"/>
      <circle cx="202" cy="58" r="30" fill="#e8d2bf"/>
      <path d="M184 71 q20 -48 40 0" fill="#c25d31" opacity="0.72"/>
    </g>
    <g transform="translate(275 30)" filter="url(#softShadow)">
      <rect class="card" width="240" height="150" rx="10"/>
      <text class="serif ink" x="24" y="45" font-size="25" font-weight="800">测试评估</text>
      <text class="sans muted" x="24" y="78" font-size="15">黑盒 → 玻璃盒 → 白盒</text>
      <rect x="24" y="99" width="55" height="24" rx="4" fill="#f5e1d5"/>
      <rect x="91" y="99" width="55" height="24" rx="4" fill="#e7eefb"/>
      <rect x="158" y="99" width="55" height="24" rx="4" fill="#e6f3df"/>
    </g>
    <g transform="translate(0 196)" filter="url(#softShadow)">
      <rect class="card" width="240" height="150" rx="10"/>
      <text class="serif ink" x="24" y="45" font-size="25" font-weight="800">六层架构画板</text>
      <text class="sans muted" x="24" y="78" font-size="15">市场 / 商业 / 用户 / 应用</text>
      <rect x="24" y="99" width="190" height="10" rx="4" fill="#dff2e4"/>
      <rect x="24" y="114" width="190" height="10" rx="4" fill="#fff0c8"/>
      <rect x="24" y="129" width="190" height="10" rx="4" fill="#e4efff"/>
    </g>
    <g transform="translate(275 196)" filter="url(#softShadow)">
      <rect class="card" width="240" height="150" rx="10"/>
      <text class="serif ink" x="24" y="45" font-size="25" font-weight="800">信息缺口</text>
      <text class="sans muted" x="24" y="78" font-size="15">事实 / 观察 / 推测 / 待验证</text>
      <text class="sans rust" x="32" y="120" font-size="42" font-weight="900">?</text>
      <path d="M86 105 h110 M86 124 h82" stroke="#776f64" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(58 818)">
    <path class="thin" d="M0 0 h210"/>
    <text class="serif ink" x="250" y="12" font-size="28" font-weight="800">开源 Skill · 面向中文 AI 产品经理</text>
    <path class="line" d="M1010 0 h210"/>
  </g>
</svg>
